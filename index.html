<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAULA EDUCA</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d2e;
color:white;
}

header{
display:flex;
align-items:center;
gap:20px;
padding:15px 25px;
background:#063c2c;
border-bottom:5px solid orange;
}

.logo{
height:90px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
background:#0f5c42;
padding:10px;
}

nav button{
background:#1e8449;
border:none;
color:white;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

.card{
background:#124734;
padding:12px;
margin:10px 0;
border-radius:6px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.salvar{
background:orange;
font-weight:bold;
}

.remover{
background:red;
color:white;
}

.admin{
position:fixed;
top:20px;
right:20px;
font-size:26px;
cursor:pointer;
background:#1e8449;
padding:10px;
border-radius:8px;
}

.arquivoBtn{
background:orange;
color:black;
font-weight:bold;
padding:6px 10px;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

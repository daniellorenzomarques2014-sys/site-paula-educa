<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAULA EDUCA 4.0</title>

<link rel="icon" href="logo-escola.png">

<style>

body{
margin:0;
font-family:Arial;
background:url('fundo-amazonico.png') center/cover fixed;
color:white;
}

header{
display:flex;
align-items:center;
gap:20px;
background:#063c2c;
padding:15px;
border-bottom:5px solid orange;
}

header img{height:80px;}

nav{
background:#0f5c42;
padding:10px;
text-align:center;
}

nav button{
background:#1e8449;
border:none;
color:white;
padding:8px 12px;
margin:4px;
cursor:pointer;
border-radius:6px;
}

section{
display:none;
padding:20px;
background:rgba(0,0,0,0.5);
margin:20px;
border-radius:10px;
}

section.active{display:block;}

.card{
background:#124734;
padding:12px;
margin:10px 0;
border-radius:8px;
}

.admin{
position:fixed;
top:20px;
right:20px;
font-size:26px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<img src="logo-escola.png">
<h1>PAULA EDUCA 4.0</h1>
</header>

<nav>

<button onclick="mostrar('biblioteca')">📚 Biblioteca</button>
<button onclick="mostrar('provas')">📝 Provas</button>
<button onclick="mostrar('ranking')">🏆 Ranking</button>
<button onclick="mostrar('pedagogico')">📊 Painel Pedagógico</button>

</nav>

<div class="admin" onclick="login()">⚙</div>

<section id="biblioteca" class="active">
<h2>Biblioteca Digital</h2>
<div id="listaArquivos"></div>
</section>

<section id="provas">
<h2>Provas Online</h2>
<div id="prova"></div>
<button onclick="corrigir()">Corrigir</button>
</section>

<section id="ranking">
<h2>Ranking de Alunos</h2>
<div id="rankingLista"></div>
</section>

<section id="pedagogico">
<h2>Painel Pedagógico</h2>
<div id="painel"></div>
</section>

<section id="admin">

<h2>Painel do Professor</h2>

<h3>Biblioteca Digital</h3>

<input id="tituloArquivo" placeholder="Título">

<input id="nomeArquivo" placeholder="Nome do arquivo (ex: aula1.pdf)">

<button onclick="cadastrarArquivo()">Cadastrar</button>

<div id="adminArquivos"></div>

<hr>

<h3>Cadastrar Questão</h3>

<input id="pergunta" placeholder="Pergunta">

<input id="a" placeholder="A">
<input id="b" placeholder="B">
<input id="c" placeholder="C">
<input id="d" placeholder="D">

<select id="correta">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<button onclick="cadastrarQuestao()">Salvar Questão</button>

</section>

<script>

/* navegação */

function mostrar(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* login */

function login(){

if(prompt("Senha professor")=="1234"){

mostrar("admin")

}

}

/* biblioteca */

let arquivos=JSON.parse(localStorage.getItem("arquivos"))||[]

function cadastrarArquivo(){

let titulo=document.getElementById("tituloArquivo").value
let nome=document.getElementById("nomeArquivo").value

arquivos.push({titulo,nome})

localStorage.setItem("arquivos",JSON.stringify(arquivos))

carregarArquivos()

}

function carregarArquivos(){

let lista=document.getElementById("listaArquivos")
let admin=document.getElementById("adminArquivos")

lista.innerHTML=""
admin.innerHTML=""

arquivos.forEach((a,i)=>{

lista.innerHTML+=`
<div class="card">
<b>${a.titulo}</b><br>
<a href="arquivos/${a.nome}" target="_blank">Visualizar</a> |
<a href="arquivos/${a.nome}" download>Baixar</a>
</div>
`

admin.innerHTML+=`
<div class="card">
${a.titulo}
<button onclick="removerArquivo(${i})">Excluir</button>
</div>
`

})

}

function removerArquivo(i){

arquivos.splice(i,1)

localStorage.setItem("arquivos",JSON.stringify(arquivos))

carregarArquivos()

}

/* provas */

let questoes=JSON.parse(localStorage.getItem("questoes"))||[]

function cadastrarQuestao(){

questoes.push({

pergunta:pergunta.value,
a:a.value,
b:b.value,
c:c.value,
d:d.value,
correta:correta.value

})

localStorage.setItem("questoes",JSON.stringify(questoes))

mostrarProva()

}

function mostrarProva(){

let div=document.getElementById("prova")

div.innerHTML=""

questoes.forEach((q,i)=>{

div.innerHTML+=`

<div class="card">

<b>${q.pergunta}</b><br>

<label><input type="radio" name="q${i}" value="A"> ${q.a}</label><br>
<label><input type="radio" name="q${i}" value="B"> ${q.b}</label><br>
<label><input type="radio" name="q${i}" value="C"> ${q.c}</label><br>
<label><input type="radio" name="q${i}" value="D"> ${q.d}</label>

</div>

`

})

}

function corrigir(){

let pontos=0

questoes.forEach((q,i)=>{

let resp=document.querySelector(`input[name=q${i}]:checked`)

if(resp && resp.value==q.correta){

pontos++

}

})

alert("Pontuação: "+pontos)

salvarRanking(pontos)

}

/* ranking */

let ranking=JSON.parse(localStorage.getItem("ranking"))||[]

function salvarRanking(pontos){

let nome=prompt("Nome do aluno")

ranking.push({nome,pontos})

localStorage.setItem("ranking",JSON.stringify(ranking))

mostrarRanking()

}

function mostrarRanking(){

let lista=document.getElementById("rankingLista")

lista.innerHTML=""

ranking.sort((a,b)=>b.pontos-a.pontos)

ranking.forEach(r=>{

lista.innerHTML+=`

<div class="card">

${r.nome} - ${r.pontos} pontos

</div>

`

})

}

/* painel pedagógico */

function painelPedagogico(){

let total=ranking.length

let media=0

ranking.forEach(r=>media+=r.pontos)

media=total?media/total:0

document.getElementById("painel").innerHTML=`

<div class="card">

Total de alunos avaliados: ${total}<br>

Média geral: ${media.toFixed(2)}

</div>

`

}

carregarArquivos()

mostrarProva()

mostrarRanking()

painelPedagogico()

</script>

</body>
</html>

<script>

/* =========================
MOSTRAR SEÇÕES
========================= */

function mostrar(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
carregarTudo();
}

/* =========================
LOGIN PROFESSOR
========================= */

function login(){
if(prompt("Senha do professor:")=="1234"){
mostrar('admin');
carregarTudo();
}
else alert("Senha incorreta");
}

/* =========================
BANCO DE DADOS
========================= */

let conteudos=JSON.parse(localStorage.getItem("conteudos")||"[]");
let questoes=JSON.parse(localStorage.getItem("questoes")||"[]");

/* =========================
SALVAR CONTEÚDO
========================= */

function salvarConteudo(){

let file=document.getElementById("pdfConteudo").files[0];

if(!file){
alert("Selecione um PDF.");
return;
}

let reader=new FileReader();

reader.onload=function(){

conteudos.push({

titulo:tituloConteudo.value,
serie:serieConteudo.value,
disciplina:disciplinaConteudo.value,
pdf:reader.result

});

localStorage.setItem("conteudos",JSON.stringify(conteudos));

alert("Conteúdo cadastrado!");

carregarTudo();

};

reader.readAsDataURL(file);

}

/* =========================
REMOVER CONTEÚDO
========================= */

function removerConteudo(i){

if(confirm("Deseja remover este conteúdo?")){

conteudos.splice(i,1);

localStorage.setItem("conteudos",JSON.stringify(conteudos));

carregarTudo();

}

}

/* =========================
CARREGAR CONTEÚDOS
========================= */

function carregarConteudos(){

listaConteudos.innerHTML="";
adminConteudos.innerHTML="";

conteudos.forEach((c,i)=>{

listaConteudos.innerHTML+=`
<div class="card">
<b>${c.titulo}</b><br>
${c.serie} - ${c.disciplina}<br>
<a href="${c.pdf}" download>📥 Baixar PDF</a>
</div>
`;

adminConteudos.innerHTML+=`
<div class="card">
${c.titulo}
<button class="small-btn" onclick="removerConteudo(${i})">Excluir</button>
</div>
`;

});

}

/* =========================
SALVAR QUESTÃO
========================= */

function salvarQuestao(){

let img=document.getElementById("imagemPergunta").files[0];

if(img){

let reader=new FileReader();

reader.onload=function(){

registrarQuestao(reader.result);

};

reader.readAsDataURL(img);

}else{

registrarQuestao("");

}

}

function registrarQuestao(imagem){

questoes.push({

tipo:tipoQuestao.value,
serie:serieQuestao.value,
disciplina:disciplinaQuestao.value,
pergunta:pergunta.value,
img:imagem,
a:a.value,
b:b.value,
c:c.value,
d:d.value,
correta:correta.value

});

localStorage.setItem("questoes",JSON.stringify(questoes));

alert("Questão cadastrada!");

carregarTudo();

}

/* =========================
REMOVER QUESTÃO
========================= */

function removerQuestao(i){

if(confirm("Deseja excluir esta questão?")){

questoes.splice(i,1);

localStorage.setItem("questoes",JSON.stringify(questoes));

carregarTudo();

}

}

/* =========================
CARREGAR QUESTÕES
========================= */

function carregarQuestoes(){

listaAtividades.innerHTML="";
listaSimulados.innerHTML="";
listaAde.innerHTML="";
listaSaeb.innerHTML="";
adminQuestoes.innerHTML="";

questoes.forEach((q,i)=>{

let bloco=`
<div class="card">
<b>${q.pergunta}</b><br>

${q.img?`<img src="${q.img}" width="200"><br>`:""}

<label><input type="radio" name="q${i}"> A) ${q.a}</label><br>
<label><input type="radio" name="q${i}"> B) ${q.b}</label><br>
<label><input type="radio" name="q${i}"> C) ${q.c}</label><br>
<label><input type="radio" name="q${i}"> D) ${q.d}</label>

</div>
`;

if(q.tipo=="Atividade") listaAtividades.innerHTML+=bloco;

if(q.tipo=="Simulado") listaSimulados.innerHTML+=bloco;

if(q.tipo=="ADE") listaAde.innerHTML+=bloco;

if(q.tipo=="SAEB") listaSaeb.innerHTML+=bloco;

/* ADMIN */

adminQuestoes.innerHTML+=`
<div class="card">
${q.pergunta}
<button class="small-btn" onclick="removerQuestao(${i})">Excluir</button>
</div>
`;

});

}

/* =========================
CARREGAR TUDO
========================= */

function carregarTudo(){

carregarConteudos();
carregarQuestoes();

}

/* INICIAR SISTEMA */

carregarTudo();

</script>

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAULA EDUCA</title>

<link rel="icon" href="logo-escola.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:url('fundo-amazonico.png') center/cover fixed;
color:white;
}

header{
background:rgba(0,60,40,0.9);
display:flex;
align-items:center;
gap:20px;
padding:15px 25px;
border-bottom:6px solid orange;
}

header img{height:90px}

header h1{
margin:0;
font-size:32px;
font-weight:800;
}

nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
background:rgba(0,40,30,0.9);
padding:10px;
}

nav button{
background:#145a32;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

nav button:hover{background:#1e8449}

section{
display:none;
padding:20px;
background:rgba(0,0,0,0.6);
margin:20px;
border-radius:12px;
}

section.active{display:block}

.admin-btn{
position:fixed;
top:20px;
right:20px;
font-size:26px;
cursor:pointer;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
}

button.salvar{
background:orange;
color:black;
font-weight:bold;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.1);
padding:12px;
border-radius:8px;
margin-top:10px;
}

.small-btn{
background:#c62828;
color:white;
padding:4px 8px;
border:none;
border-radius:4px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<img src="logo-escola.png">

<h1>PAULA EDUCA</h1>

</header>

<nav>

<button onclick="abrir('inicio')">🏠 Início</button>
<button onclick="abrir('conteudos')">📚 Conteúdos</button>
<button onclick="abrir('atividades')">📝 Atividades</button>
<button onclick="abrir('simulados')">🎯 Simulados</button>
<button onclick="abrir('ade')">📊 ADE</button>
<button onclick="abrir('saeb')">📈 SAEB</button>
<button onclick="abrir('projetos')">🧩 Projetos</button>
<button onclick="abrir('eventos')">🎉 Eventos</button>
<button onclick="abrir('resultados')">🏆 Resultados</button>

</nav>

<div class="admin-btn" onclick="login()">⚙️</div>

<section id="inicio" class="active">
<h2>Bem-vindo ao PAULA EDUCA</h2>
</section>

<section id="conteudos"><h2>Conteúdos</h2><div id="lista_conteudos"></div></section>

<section id="atividades"><h2>Atividades</h2><div id="lista_atividades"></div></section>

<section id="simulados"><h2>Simulados</h2><div id="lista_simulados"></div></section>

<section id="ade"><h2>ADE</h2><div id="lista_ade"></div></section>

<section id="saeb"><h2>SAEB</h2><div id="lista_saeb"></div></section>

<section id="projetos"><h2>Projetos</h2><div id="lista_projetos"></div></section>

<section id="eventos"><h2>Eventos</h2><div id="lista_eventos"></div></section>

<section id="resultados"><h2>Resultados</h2><div id="lista_resultados"></div></section>

<section id="admin">

<h2>Painel do Professor</h2>

<select id="tipoMaterial">

<option>Conteúdos</option>
<option>Atividades</option>
<option>Simulados</option>
<option>ADE</option>
<option>SAEB</option>
<option>Projetos</option>
<option>Eventos</option>
<option>Resultados</option>

</select>

<input id="tituloMaterial" placeholder="Título">

<input id="serieMaterial" placeholder="Série">

<input id="disciplinaMaterial" placeholder="Disciplina">

<input type="file" id="arquivoMaterial">

<button class="salvar" onclick="salvarMaterial()">Salvar</button>

<h3>Itens cadastrados</h3>

<div id="adminMateriais"></div>

</section>

<script>

function abrir(id){

document.querySelectorAll("section").forEach(sec=>sec.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

function login(){

if(prompt("Senha do professor:")=="1234"){

abrir("admin");

}

else{

alert("Senha incorreta");

}

}

let materiais=JSON.parse(localStorage.getItem("materiais"))||[];

function salvarMaterial(){

let tipo=document.getElementById("tipoMaterial").value;

let titulo=document.getElementById("tituloMaterial").value;

let serie=document.getElementById("serieMaterial").value;

let disciplina=document.getElementById("disciplinaMaterial").value;

let file=document.getElementById("arquivoMaterial").files[0];

if(!file){

alert("Selecione um arquivo");

return;

}

let reader=new FileReader();

reader.onload=function(){

materiais.push({

tipo,
titulo,
serie,
disciplina,
arquivo:reader.result

});

localStorage.setItem("materiais",JSON.stringify(materiais));

carregar();

};

reader.readAsDataURL(file);

}

function removerMaterial(i){

materiais.splice(i,1);

localStorage.setItem("materiais",JSON.stringify(materiais));

carregar();

}

function carregar(){

document.querySelectorAll("[id^=lista_]").forEach(e=>e.innerHTML="");

document.getElementById("adminMateriais").innerHTML="";

materiais.forEach((m,i)=>{

let bloco=`<div class="card">

<b>${m.titulo}</b><br>

${m.serie} - ${m.disciplina}<br>

<a href="${m.arquivo}" target="_blank">Abrir</a>

</div>`;

if(m.tipo=="Conteúdos") document.getElementById("lista_conteudos").innerHTML+=bloco;

if(m.tipo=="Atividades") document.getElementById("lista_atividades").innerHTML+=bloco;

if(m.tipo=="Simulados") document.getElementById("lista_simulados").innerHTML+=bloco;

if(m.tipo=="ADE") document.getElementById("lista_ade").innerHTML+=bloco;

if(m.tipo=="SAEB") document.getElementById("lista_saeb").innerHTML+=bloco;

if(m.tipo=="Projetos") document.getElementById("lista_projetos").innerHTML+=bloco;

if(m.tipo=="Eventos") document.getElementById("lista_eventos").innerHTML+=bloco;

if(m.tipo=="Resultados") document.getElementById("lista_resultados").innerHTML+=bloco;

document.getElementById("adminMateriais").innerHTML+=`

<div class="card">

${m.titulo} (${m.tipo})

<button class="small-btn" onclick="removerMaterial(${i})">Excluir</button>

</div>`;

});

}

carregar();

</script>

</body>
</html>

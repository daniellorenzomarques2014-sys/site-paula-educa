<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAULA EDUCA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d2e;
color:white;
}

header{
display:flex;
align-items:center;
gap:20px;
padding:15px;
background:#063c2c;
border-bottom:4px solid orange;
}

header img{
height:70px;
}

nav{
background:#0f5c42;
padding:10px;
text-align:center;
}

nav button{
background:#1e8449;
border:none;
color:white;
padding:8px 12px;
margin:4px;
cursor:pointer;
border-radius:5px;
font-size:15px;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

.card{
background:#124734;
padding:12px;
margin:10px 0;
border-radius:6px;
}

.admin{
position:fixed;
top:15px;
right:15px;
font-size:26px;
cursor:pointer;
}

input,select{
padding:6px;
margin:4px;
}

</style>
</head>

<body>

<header>
<img src="logo-escola.png">
<h2>PAULA EDUCA</h2>
</header>

<nav>

<button onclick="abrir('inicio')">🏠 Início</button>
<button onclick="abrir('conteudos')">📚 Conteúdos</button>
<button onclick="abrir('atividades')">📝 Atividades</button>
<button onclick="abrir('simulados')">🎯 Simulados</button>
<button onclick="abrir('ade')">📊 ADE</button>
<button onclick="abrir('saeb')">📈 SAEB</button>
<button onclick="abrir('projetos')">🧩 Projetos</button>
<button onclick="abrir('eventos')">🎉 Eventos</button>
<button onclick="abrir('resultados')">🏆 Resultados</button>

</nav>

<div class="admin" onclick="login()">⚙</div>

<section id="inicio" class="active">
<h2>🏠 Bem-vindo ao PAULA EDUCA</h2>
<p>Ambiente digital de aprendizagem.</p>
</section>

<section id="conteudos"><h2>📚 Conteúdos</h2><div id="lista_conteudos"></div></section>

<section id="atividades"><h2>📝 Atividades</h2><div id="lista_atividades"></div></section>

<section id="simulados"><h2>🎯 Simulados</h2><div id="lista_simulados"></div></section>

<section id="ade"><h2>📊 ADE</h2><div id="lista_ade"></div></section>

<section id="saeb"><h2>📈 SAEB</h2><div id="lista_saeb"></div></section>

<section id="projetos"><h2>🧩 Projetos</h2><div id="lista_projetos"></div></section>

<section id="eventos"><h2>🎉 Eventos</h2><div id="lista_eventos"></div></section>

<section id="resultados"><h2>🏆 Resultados</h2><div id="lista_resultados"></div></section>

<section id="admin">

<h2>⚙ Painel do Professor</h2>

<input id="titulo" placeholder="Título">

<select id="tipo">
<option value="conteudos">Conteúdos</option>
<option value="atividades">Atividades</option>
<option value="simulados">Simulados</option>
<option value="ade">ADE</option>
<option value="saeb">SAEB</option>
<option value="projetos">Projetos</option>
<option value="eventos">Eventos</option>
<option value="resultados">Resultados</option>
</select>

<input id="arquivo" placeholder="Nome do arquivo (ex: aula1.pdf)">

<button onclick="salvar()">Cadastrar</button>

<h3>Itens cadastrados</h3>

<div id="lista_admin"></div>

</section>

<script>

let dados=JSON.parse(localStorage.getItem("dados"))||[]

function abrir(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

carregar()

}

function login(){

let senha=prompt("Senha do professor")

if(senha=="1234"){

abrir("admin")

}

}

function salvar(){

let titulo=document.getElementById("titulo").value
let tipo=document.getElementById("tipo").value
let arquivo=document.getElementById("arquivo").value

dados.push({titulo,tipo,arquivo})

localStorage.setItem("dados",JSON.stringify(dados))

carregar()

}

function remover(i){

dados.splice(i,1)

localStorage.setItem("dados",JSON.stringify(dados))

carregar()

}

function carregar(){

document.querySelectorAll("[id^=lista_]").forEach(l=>l.innerHTML="")

document.getElementById("lista_admin").innerHTML=""

dados.forEach((d,i)=>{

let bloco=`

<div class="card">

<b>${d.titulo}</b><br>

<a href="arquivos/${d.arquivo}" target="_blank">Visualizar</a>

|

<a href="arquivos/${d.arquivo}" download>Baixar</a>

</div>

`

let destino=document.getElementById("lista_"+d.tipo)

if(destino) destino.innerHTML+=bloco

document.getElementById("lista_admin").innerHTML+=`

<div class="card">

${d.titulo} (${d.tipo})

<button onclick="remover(${i})">Remover</button>

</div>

`

})

}

carregar()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAULA EDUCA</title>

<link rel="icon" href="logo-escola.png">

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d2e;
color:white;
}

header{
display:flex;
align-items:center;
gap:20px;
padding:20px;
background:#063c2c;
border-bottom:5px solid orange;
}

header img{
height:80px;
}

nav{
background:#0f5c42;
padding:10px;
text-align:center;
}

nav button{
padding:8px 12px;
margin:3px;
background:#1e8449;
border:none;
color:white;
cursor:pointer;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

.card{
background:#124734;
padding:10px;
margin:10px 0;
border-radius:6px;
}

.admin{
position:fixed;
top:20px;
right:20px;
font-size:24px;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<img src="logo-escola.png">

<h1>PAULA EDUCA</h1>

</header>

<nav>

<button onclick="mostrar('conteudos')">Conteúdos</button>
<button onclick="mostrar('atividades')">Atividades</button>
<button onclick="mostrar('simulados')">Simulados</button>
<button onclick="mostrar('ade')">ADE</button>
<button onclick="mostrar('saeb')">SAEB</button>
<button onclick="mostrar('projetos')">Projetos</button>
<button onclick="mostrar('eventos')">Eventos</button>

</nav>

<div class="admin" onclick="login()">⚙</div>

<section id="conteudos" class="active">
<h2>Conteúdos</h2>
<div id="listaConteudos"></div>
</section>

<section id="atividades">
<h2>Atividades</h2>
<div id="listaAtividades"></div>
</section>

<section id="simulados">
<h2>Simulados</h2>
<div id="listaSimulados"></div>
</section>

<section id="ade">
<h2>ADE</h2>
<div id="listaAde"></div>
</section>

<section id="saeb">
<h2>SAEB</h2>
<div id="listaSaeb"></div>
</section>

<section id="projetos">
<h2>Projetos</h2>
<div id="listaProjetos"></div>
</section>

<section id="eventos">
<h2>Eventos</h2>
<div id="listaEventos"></div>
</section>

<section id="admin">

<h2>Painel do Professor</h2>

<input id="titulo" placeholder="Título">

<select id="tipo">

<option>conteudos</option>
<option>atividades</option>
<option>simulados</option>
<option>ade</option>
<option>saeb</option>
<option>projetos</option>
<option>eventos</option>

</select>

<input id="arquivo" placeholder="Nome do arquivo (ex: aula1.pdf)">

<button onclick="salvar()">Cadastrar</button>

<div id="listaAdmin"></div>

</section>

<script>

let dados=JSON.parse(localStorage.getItem("dados"))||[];

function mostrar(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");

carregar();

}

function login(){

if(prompt("Senha professor")=="1234"){

mostrar("admin");

}

}

function salvar(){

let titulo=document.getElementById("titulo").value;

let tipo=document.getElementById("tipo").value;

let arquivo=document.getElementById("arquivo").value;

dados.push({

titulo:titulo,
tipo:tipo,
arquivo:arquivo

});

localStorage.setItem("dados",JSON.stringify(dados));

carregar();

}

function remover(i){

dados.splice(i,1);

localStorage.setItem("dados",JSON.stringify(dados));

carregar();

}

function carregar(){

let tipos=["conteudos","atividades","simulados","ade","saeb","projetos","eventos"];

tipos.forEach(t=>{

let lista=document.getElementById("lista"+t.charAt(0).toUpperCase()+t.slice(1));

if(lista) lista.innerHTML="";

});

document.getElementById("listaAdmin").innerHTML="";

dados.forEach((d,i)=>{

let bloco=`

<div class="card">

<b>${d.titulo}</b><br>

<a href="arquivos/${d.arquivo}" target="_blank">Visualizar</a>

|

<a href="arquivos/${d.arquivo}" download>Baixar</a>

</div>

`;

let destino=document.getElementById("lista"+d.tipo.charAt(0).toUpperCase()+d.tipo.slice(1));

if(destino) destino.innerHTML+=bloco;

document.getElementById("listaAdmin").innerHTML+=`

<div class="card">

${d.titulo}

<button onclick="remover(${i})">Excluir</button>

</div>

`;

});

}

carregar();

</script>

</body>
</html>

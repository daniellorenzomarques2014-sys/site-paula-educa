```html
<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAULA EDUCA</title>

<link rel="icon" href="logo-escola.png">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b3d2e;
color:white;
}

header{
display:flex;
align-items:center;
gap:20px;
padding:15px 25px;
background:#063c2c;
border-bottom:6px solid orange;
position:sticky;
top:0;
z-index:1000;
}

.logo{
height:90px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
background:#0f5c42;
padding:10px;
}

nav button{
background:#1e8449;
border:none;
color:white;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

nav button:hover{
background:#27ae60;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

.card{
background:#124734;
padding:15px;
margin:10px 0;
border-radius:8px;
box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.salvar{
background:orange;
font-weight:bold;
}

.remover{
background:red;
color:white;
margin-top:8px;
}

.admin{
position:fixed;
top:15px;
right:15px;
font-size:28px;
cursor:pointer;
background:#1e8449;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
box-shadow:0 0 10px rgba(0,0,0,0.6);
z-index:9999;
}

a{
color:orange;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<img src="logo-escola.png" class="logo">

<h1>PAULA EDUCA</h1>

</header>

<nav>

<button onclick="abrir('inicio')">🏠 Início</button>
<button onclick="abrir('conteudos')">📚 Conteúdos</button>
<button onclick="abrir('atividades')">📝 Atividades</button>
<button onclick="abrir('simulados')">🎯 Simulados</button>
<button onclick="abrir('ade')">📊 ADE</button>
<button onclick="abrir('saeb')">📈 SAEB</button>
<button onclick="abrir('projetos')">🧩 Projetos</button>
<button onclick="abrir('eventos')">🎉 Eventos</button>
<button onclick="abrir('resultados')">🏆 Resultados</button>

</nav>

<div class="admin" onclick="login()">⚙</div>

<section id="inicio" class="active">
<h2>Bem-vindo ao PAULA EDUCA</h2>
<p>Plataforma educacional da escola.</p>
</section>

<section id="conteudos"><h2>Conteúdos</h2><div id="conteudosLista"></div></section>
<section id="atividades"><h2>Atividades</h2><div id="atividadesLista"></div></section>
<section id="simulados"><h2>Simulados</h2><div id="simuladosLista"></div></section>
<section id="ade"><h2>ADE</h2><div id="adeLista"></div></section>
<section id="saeb"><h2>SAEB</h2><div id="saebLista"></div></section>
<section id="projetos"><h2>Projetos</h2><div id="projetosLista"></div></section>
<section id="eventos"><h2>Eventos</h2><div id="eventosLista"></div></section>
<section id="resultados"><h2>Resultados</h2><div id="resultadosLista"></div></section>

<section id="admin">

<h2>Painel do Professor</h2>

<select id="tipo">

<option>Conteúdos</option>
<option>Atividades</option>
<option>Simulados</option>
<option>ADE</option>
<option>SAEB</option>
<option>Projetos</option>
<option>Eventos</option>
<option>Resultados</option>

</select>

<input id="titulo" placeholder="Título">

<input id="serie" placeholder="Série">

<input id="disciplina" placeholder="Disciplina">

<select id="qtd">
<option value="">Quantidade de questões</option>
<option>10</option>
<option>20</option>
<option>50</option>
</select>

<input type="file" id="arquivo">

<button class="salvar" onclick="salvar()">Salvar</button>

<div id="adminLista"></div>

</section>

<script>

let db

let request=indexedDB.open("PAULAEDUCA",1)

request.onupgradeneeded=e=>{

db=e.target.result

db.createObjectStore("materiais",{keyPath:"id",autoIncrement:true})

}

request.onsuccess=e=>{

db=e.target.result

carregar()

}

function abrir(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function login(){

if(prompt("Senha professor")=="1234"){

abrir("admin")

}else{

alert("Senha incorreta")

}

}

function salvar(){

let tipo=document.getElementById("tipo").value
let titulo=document.getElementById("titulo").value
let serie=document.getElementById("serie").value
let disciplina=document.getElementById("disciplina").value
let qtd=document.getElementById("qtd").value
let arquivo=document.getElementById("arquivo").files[0]

if(!titulo){

alert("Digite um título")
return

}

function gravar(dadoArquivo){

let tx=db.transaction("materiais","readwrite")

let store=tx.objectStore("materiais")

store.add({
tipo,
titulo,
serie,
disciplina,
qtd,
arquivo:dadoArquivo
})

tx.oncomplete=function(){

limpar()
carregar()

}

}

if(arquivo){

let reader=new FileReader()

reader.onload=function(){

gravar(reader.result)

}

reader.readAsDataURL(arquivo)

}else{

gravar("")

}

}

function limpar(){

document.getElementById("titulo").value=""
document.getElementById("serie").value=""
document.getElementById("disciplina").value=""
document.getElementById("qtd").value=""
document.getElementById("arquivo").value=""

}

function remover(id){

if(confirm("Deseja remover este material?")){

let tx=db.transaction("materiais","readwrite")

tx.objectStore("materiais").delete(id)

tx.oncomplete=carregar

}

}

function carregar(){

let listas={

Conteúdos:conteudosLista,
Atividades:atividadesLista,
Simulados:simuladosLista,
ADE:adeLista,
SAEB:saebLista,
Projetos:projetosLista,
Eventos:eventosLista,
Resultados:resultadosLista

}

Object.values(listas).forEach(l=>l.innerHTML="")

adminLista.innerHTML=""

let tx=db.transaction("materiais","readonly")

let store=tx.objectStore("materiais")

store.openCursor().onsuccess=e=>{

let cursor=e.target.result

if(cursor){

let m=cursor.value

let bloco=`

<div class="card">

<h3>${m.titulo}</h3>

<p>${m.serie} - ${m.disciplina}</p>

${m.qtd ? `<p>Questões: ${m.qtd}</p>`:""}

${m.arquivo ? `<a href="${m.arquivo}" target="_blank">Abrir arquivo</a>`:""}

</div>

`

listas[m.tipo].innerHTML+=bloco

adminLista.innerHTML+=`

<div class="card">

${m.titulo}

<button class="remover" onclick="remover(${cursor.key})">Remover</button>

</div>

`

cursor.continue()

}

}

}

</script>

</body>
</html>
```

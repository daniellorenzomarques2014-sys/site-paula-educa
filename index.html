<script>

/* ======================
MOSTRAR SEÇÕES
====================== */

function mostrar(id){

document.querySelectorAll("section").forEach(sec=>{
sec.classList.remove("active");
});

document.getElementById(id).classList.add("active");

carregarTudo();

}

/* ======================
LOGIN PROFESSOR
====================== */

function login(){

let senha=prompt("Senha do professor:");

if(senha==="1234"){

mostrar("admin");

}else{

alert("Senha incorreta");

}

}

/* ======================
BANCO DE DADOS
====================== */

let conteudos = JSON.parse(localStorage.getItem("conteudos")) || [];
let questoes = JSON.parse(localStorage.getItem("questoes")) || [];

/* ======================
SALVAR CONTEÚDO
====================== */

function salvarConteudo(){

let titulo=document.getElementById("tituloConteudo").value;
let serie=document.getElementById("serieConteudo").value;
let disciplina=document.getElementById("disciplinaConteudo").value;
let file=document.getElementById("pdfConteudo").files[0];

if(!titulo || !serie || !disciplina || !file){

alert("Preencha todos os campos.");

return;

}

let reader=new FileReader();

reader.onload=function(){

conteudos.push({

titulo:titulo,
serie:serie,
disciplina:disciplina,
pdf:reader.result

});

localStorage.setItem("conteudos",JSON.stringify(conteudos));

alert("Conteúdo cadastrado!");

carregarTudo();

};

reader.readAsDataURL(file);

}

/* ======================
REMOVER CONTEÚDO
====================== */

function removerConteudo(i){

if(confirm("Deseja remover este conteúdo?")){

conteudos.splice(i,1);

localStorage.setItem("conteudos",JSON.stringify(conteudos));

carregarTudo();

}

}

/* ======================
CARREGAR CONTEÚDOS
====================== */

function carregarConteudos(){

let lista=document.getElementById("listaConteudos");
let adminLista=document.getElementById("adminConteudos");

lista.innerHTML="";
adminLista.innerHTML="";

conteudos.forEach((c,i)=>{

lista.innerHTML+=`
<div class="card">
<b>${c.titulo}</b><br>
${c.serie} - ${c.disciplina}<br>
<a href="${c.pdf}" download>📥 Baixar PDF</a>
</div>
`;

adminLista.innerHTML+=`
<div class="card">
${c.titulo}
<button class="small-btn" onclick="removerConteudo(${i})">Excluir</button>
</div>
`;

});

}

/* ======================
SALVAR QUESTÃO
====================== */

function salvarQuestao(){

let tipo=document.getElementById("tipoQuestao").value;
let serie=document.getElementById("serieQuestao").value;
let disciplina=document.getElementById("disciplinaQuestao").value;
let pergunta=document.getElementById("pergunta").value;

let a=document.getElementById("a").value;
let b=document.getElementById("b").value;
let c=document.getElementById("c").value;
let d=document.getElementById("d").value;

let correta=document.getElementById("correta").value;

let img=document.getElementById("imagemPergunta").files[0];

function registrar(imagem){

questoes.push({

tipo:tipo,
serie:serie,
disciplina:disciplina,
pergunta:pergunta,
img:imagem,
a:a,
b:b,
c:c,
d:d,
correta:correta

});

localStorage.setItem("questoes",JSON.stringify(questoes));

alert("Questão cadastrada!");

carregarTudo();

}

if(img){

let reader=new FileReader();

reader.onload=function(){

registrar(reader.result);

};

reader.readAsDataURL(img);

}else{

registrar("");

}

}

/* ======================
REMOVER QUESTÃO
====================== */

function removerQuestao(i){

if(confirm("Excluir questão?")){

questoes.splice(i,1);

localStorage.setItem("questoes",JSON.stringify(questoes));

carregarTudo();

}

}

/* ======================
CARREGAR QUESTÕES
====================== */

function carregarQuestoes(){

let atividades=document.getElementById("listaAtividades");
let simulados=document.getElementById("listaSimulados");
let ade=document.getElementById("listaAde");
let saeb=document.getElementById("listaSaeb");
let admin=document.getElementById("adminQuestoes");

atividades.innerHTML="";
simulados.innerHTML="";
ade.innerHTML="";
saeb.innerHTML="";
admin.innerHTML="";

questoes.forEach((q,i)=>{

let bloco=`
<div class="card">

<b>${q.pergunta}</b><br>

${q.img?`<img src="${q.img}" width="200"><br>`:""}

A) ${q.a}<br>
B) ${q.b}<br>
C) ${q.c}<br>
D) ${q.d}

</div>
`;

if(q.tipo==="Atividade") atividades.innerHTML+=bloco;

if(q.tipo==="Simulado") simulados.innerHTML+=bloco;

if(q.tipo==="ADE") ade.innerHTML+=bloco;

if(q.tipo==="SAEB") saeb.innerHTML+=bloco;

admin.innerHTML+=`
<div class="card">
${q.pergunta}
<button class="small-btn" onclick="removerQuestao(${i})">Excluir</button>
</div>
`;

});

}

/* ======================
CARREGAR SISTEMA
====================== */

function carregarTudo(){

carregarConteudos();
carregarQuestoes();

}

/* INICIAR */

document.addEventListener("DOMContentLoaded",function(){

carregarTudo();

});

</script>

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAULA EDUCA</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="logo-escola.png">
<link rel="shortcut icon" href="logo-escola.png">

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d2e;
color:white;
}

header{
display:flex;
align-items:center;
gap:20px;
padding:15px 25px;
background:#063c2c;
border-bottom:6px solid orange;
}

.logo{
height:90px;
width:auto;
object-fit:contain;
}

header h1{
margin:0;
font-size:30px;
font-weight:bold;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
background:#0f5c42;
padding:10px;
}

nav button{
background:#1e8449;
border:none;
color:white;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

nav button:hover{
background:#27ae60;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

.admin{
position:fixed;
top:20px;
right:20px;
font-size:26px;
cursor:pointer;
}

.card{
background:#124734;
padding:12px;
margin:10px 0;
border-radius:6px;
}

input,select{
padding:8px;
margin:5px 0;
width:100%;
border-radius:5px;
border:none;
}

button.salvar{
background:orange;
border:none;
padding:10px;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

.remover{
background:#c62828;
border:none;
color:white;
padding:6px 10px;
margin-left:10px;
cursor:pointer;
border-radius:5px;
}

a{
color:#f1c40f;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<img src="logo-escola.png" class="logo">

<h1>PAULA EDUCA</h1>

</header>

<nav>

<button onclick="abrir('inicio')">🏠 Início</button>
<button onclick="abrir('conteudos')">📚 Conteúdos</button>
<button onclick="abrir('atividades')">📝 Atividades</button>
<button onclick="abrir('simulados')">🎯 Simulados</button>
<button onclick="abrir('ade')">📊 ADE</button>
<button onclick="abrir('saeb')">📈 SAEB</button>
<button onclick="abrir('projetos')">🧩 Projetos</button>
<button onclick="abrir('eventos')">🎉 Eventos</button>
<button onclick="abrir('resultados')">🏆 Resultados</button>

</nav>

<div class="admin" onclick="login()">⚙</div>

<section id="inicio" class="active">
<h2>Bem-vindo ao PAULA EDUCA</h2>
<p>Plataforma educacional da escola.</p>
</section>

<section id="conteudos"><h2>Conteúdos</h2><div id="listaConteudos"></div></section>
<section id="atividades"><h2>Atividades</h2><div id="listaAtividades"></div></section>
<section id="simulados"><h2>Simulados</h2><div id="listaSimulados"></div></section>
<section id="ade"><h2>ADE</h2><div id="listaAde"></div></section>
<section id="saeb"><h2>SAEB</h2><div id="listaSaeb"></div></section>
<section id="projetos"><h2>Projetos</h2><div id="listaProjetos"></div></section>
<section id="eventos"><h2>Eventos</h2><div id="listaEventos"></div></section>
<section id="resultados"><h2>Resultados</h2><div id="listaResultados"></div></section>

<section id="admin">

<h2>Painel do Professor</h2>

<label>Tipo de material</label>

<select id="tipo">

<option>Conteúdos</option>
<option>Atividades</option>
<option>Simulados</option>
<option>ADE</option>
<option>SAEB</option>
<option>Projetos</option>
<option>Eventos</option>
<option>Resultados</option>

</select>

<input id="titulo" placeholder="Título">
<input id="serie" placeholder="Série">
<input id="disciplina" placeholder="Disciplina">

<label>Quantidade de questões</label>

<select id="qtd">

<option value="">Nenhuma</option>
<option>10</option>
<option>20</option>
<option>50</option>

</select>

<input id="link" placeholder="Link do material (PDF, vídeo etc)">

<button class="salvar" onclick="salvar()">Salvar</button>

<h3>Materiais cadastrados</h3>

<div id="adminLista"></div>

</section>

<script>

let dados = JSON.parse(localStorage.getItem("paulaeduca")) || []

function abrir(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")

carregar()

}

function login(){

let senha = prompt("Senha do professor")

if(senha=="1234"){
abrir("admin")
}else{
alert("Senha incorreta")
}

}

function salvar(){

let tipo = document.getElementById("tipo").value
let titulo = document.getElementById("titulo").value
let serie = document.getElementById("serie").value
let disciplina = document.getElementById("disciplina").value
let qtd = document.getElementById("qtd").value
let link = document.getElementById("link").value

if(titulo==""){
alert("Digite o título")
return
}

dados.push({tipo,titulo,serie,disciplina,qtd,link})

localStorage.setItem("paulaeduca",JSON.stringify(dados))

document.getElementById("titulo").value=""
document.getElementById("serie").value=""
document.getElementById("disciplina").value=""
document.getElementById("qtd").value=""
document.getElementById("link").value=""

carregar()

}

function remover(i){

dados.splice(i,1)

localStorage.setItem("paulaeduca",JSON.stringify(dados))

carregar()

}

function carregar(){

listaConteudos.innerHTML=""
listaAtividades.innerHTML=""
listaSimulados.innerHTML=""
listaAde.innerHTML=""
listaSaeb.innerHTML=""
listaProjetos.innerHTML=""
listaEventos.innerHTML=""
listaResultados.innerHTML=""
adminLista.innerHTML=""

dados.forEach((d,i)=>{

let bloco = `
<div class="card">

<b>${d.titulo}</b><br>
${d.serie} - ${d.disciplina}<br>
${d.qtd ? "Questões: "+d.qtd+"<br>" : ""}
<a href="${d.link}" target="_blank">Abrir material</a>

</div>
`

if(d.tipo=="Conteúdos") listaConteudos.innerHTML+=bloco
if(d.tipo=="Atividades") listaAtividades.innerHTML+=bloco
if(d.tipo=="Simulados") listaSimulados.innerHTML+=bloco
if(d.tipo=="ADE") listaAde.innerHTML+=bloco
if(d.tipo=="SAEB") listaSaeb.innerHTML+=bloco
if(d.tipo=="Projetos") listaProjetos.innerHTML+=bloco
if(d.tipo=="Eventos") listaEventos.innerHTML+=bloco
if(d.tipo=="Resultados") listaResultados.innerHTML+=bloco

adminLista.innerHTML+=`
<div class="card">

${d.titulo} (${d.tipo})

<button class="remover" onclick="remover(${i})">Remover</button>

</div>
`

})

}

carregar()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAULA EDUCA</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="shortcut icon" href="favicon.ico">

<meta name="theme-color" content="#0b3d2e">

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d2e;
color:white;
}

header{
display:flex;
align-items:center;
gap:20px;
padding:15px 25px;
background:#063c2c;
border-bottom:5px solid orange;
}

.logo{
height:90px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
background:#0f5c42;
padding:10px;
}

nav button{
background:#1e8449;
border:none;
color:white;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

.card{
background:#124734;
padding:12px;
margin:10px 0;
border-radius:6px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.salvar{
background:orange;
font-weight:bold;
}

.remover{
background:red;
color:white;
}

.admin{
position:fixed;
top:20px;
right:20px;
font-size:26px;
cursor:pointer;
background:#1e8449;
padding:10px;
border-radius:8px;
}

.arquivoBtn{
background:orange;
color:black;
font-weight:bold;
padding:6px 10px;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<img src="logo-escola.png" class="logo">

<h1>PAULA EDUCA</h1>

</header>

<nav>

<button onclick="abrir('inicio')">🏠 Início</button>
<button onclick="abrir('conteudos')">📚 Conteúdos</button>
<button onclick="abrir('atividades')">📝 Atividades</button>
<button onclick="abrir('simulados')">🎯 Simulados</button>
<button onclick="abrir('ade')">📊 ADE</button>
<button onclick="abrir('saeb')">📈 SAEB</button>
<button onclick="abrir('projetos')">🧩 Projetos</button>
<button onclick="abrir('eventos')">🎉 Eventos</button>
<button onclick="abrir('resultados')">🏆 Resultados</button>

</nav>

<div class="admin" onclick="login()">⚙</div>

<section id="inicio" class="active">

<h2>Bem-vindo ao PAULA EDUCA</h2>

<p>Plataforma educacional da escola.</p>

</section>

<section id="conteudos"><h2>Conteúdos</h2><div id="conteudosLista"></div></section>
<section id="atividades"><h2>Atividades</h2><div id="atividadesLista"></div></section>
<section id="simulados"><h2>Simulados</h2><div id="simuladosLista"></div></section>
<section id="ade"><h2>ADE</h2><div id="adeLista"></div></section>
<section id="saeb"><h2>SAEB</h2><div id="saebLista"></div></section>
<section id="projetos"><h2>Projetos</h2><div id="projetosLista"></div></section>
<section id="eventos"><h2>Eventos</h2><div id="eventosLista"></div></section>
<section id="resultados"><h2>Resultados</h2><div id="resultadosLista"></div></section>

<section id="admin">

<h2>Painel do Professor</h2>

<select id="tipo">

<option>Conteúdos</option>
<option>Atividades</option>
<option>Simulados</option>
<option>ADE</option>
<option>SAEB</option>
<option>Projetos</option>
<option>Eventos</option>
<option>Resultados</option>

</select>

<input id="titulo" placeholder="Título">
<input id="serie" placeholder="Série">
<input id="disciplina" placeholder="Disciplina">

<input type="file" id="arquivo">

<button class="salvar" onclick="salvar()">Salvar</button>

<h3>Materiais cadastrados</h3>

<div id="adminLista"></div>

</section>

<script>

function abrir(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function login(){
let senha=prompt("Digite a senha do professor")
if(senha==="1234"){
abrir("admin")
}else{
alert("Senha incorreta")
}
}

let banco=[]

function salvar(){

let tipo=document.getElementById("tipo").value
let titulo=document.getElementById("titulo").value
let serie=document.getElementById("serie").value
let disciplina=document.getElementById("disciplina").value

let arquivoInput=document.getElementById("arquivo")

if(arquivoInput.files.length===0){
alert("Selecione um arquivo")
return
}

let arquivo=arquivoInput.files[0]

let reader=new FileReader()

reader.onload=function(){

let material={
id:Date.now(),
tipo,
titulo,
serie,
disciplina,
arquivo:reader.result,
nome:arquivo.name,
tipoArquivo:arquivo.type
}

banco.push(material)

localStorage.setItem("paulaEduca",JSON.stringify(banco))

carregar()

}

reader.readAsDataURL(arquivo)

}

function remover(id){

banco=banco.filter(m=>m.id!=id)

localStorage.setItem("paulaEduca",JSON.stringify(banco))

carregar()

}

function icone(tipo){

if(tipo.includes("pdf")) return "📄 Abrir PDF"

if(tipo.includes("image")) return "🖼 Ver Imagem"

if(tipo.includes("video")) return "🎥 Assistir Vídeo"

if(tipo.includes("word")||tipo.includes("officedocument")) return "📄 Abrir Documento"

return "📁 Abrir Arquivo"

}

function carregar(){

banco=JSON.parse(localStorage.getItem("paulaEduca"))||[]

let listas={
Conteúdos:"conteudosLista",
Atividades:"atividadesLista",
Simulados:"simuladosLista",
ADE:"adeLista",
SAEB:"saebLista",
Projetos:"projetosLista",
Eventos:"eventosLista",
Resultados:"resultadosLista"
}

Object.values(listas).forEach(id=>{
document.getElementById(id).innerHTML=""
})

adminLista.innerHTML=""

banco.forEach(m=>{

let botao=`<a class="arquivoBtn" href="${m.arquivo}" download="${m.nome}" target="_blank">${icone(m.tipoArquivo)}</a>`

let bloco=`<div class="card"><b>${m.titulo}</b><br>${m.serie} - ${m.disciplina}<br>${botao}</div>`

document.getElementById(listas[m.tipo]).innerHTML+=bloco

adminLista.innerHTML+=`<div class="card">${m.titulo} <button class="remover" onclick="remover(${m.id})">Remover</button></div>`

})

}

carregar()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAULA EDUCA</title>

<link rel="icon" type="image/png" href="logo-escola.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:url('fundo-amazonico.png') no-repeat center center fixed;
background-size:cover;
color:#fff;
}

header{
background:linear-gradient(rgba(0,60,40,0.85), rgba(0,60,40,0.85));
display:flex;
align-items:center;
gap:20px;
padding:15px 25px;
border-bottom:6px solid orange;
}

header img{height:90px;}

header h1{
margin:0;
font-size:34px;
font-weight:800;
letter-spacing:2px
}

nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
background:rgba(0,40,30,0.9);
padding:10px;
}

nav button{
background:#145a32;
border:none;
color:#fff;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

nav button:hover{background:#1e8449;}

section{
display:none;
padding:20px;
background:rgba(0,0,0,0.55);
margin:20px;
border-radius:12px;
}

section.active{display:block;}

.admin-btn{
position:fixed;
top:20px;
right:20px;
font-size:26px;
cursor:pointer;
}

input,select,textarea{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
}

button.salvar{
background:orange;
color:#000;
font-weight:bold;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.1);
padding:12px;
border-radius:8px;
margin-top:10px;
}

.small-btn{
background:#c62828;
color:#fff;
padding:4px 8px;
margin-left:5px;
border:none;
border-radius:4px;
cursor:pointer
}
</style>
</head>

<body>

<header>
<img src="logo-escola.png">
<h1>PAULA EDUCA</h1>
</header>

<nav>
<button onclick="mostrar('inicio')">🏠 Início</button>
<button onclick="mostrar('conteudos')">📚 Conteúdos</button>
<button onclick="mostrar('atividades')">📝 Atividades</button>
<button onclick="mostrar('simulados')">🎯 Simulados</button>
<button onclick="mostrar('ade')">📊 ADE</button>
<button onclick="mostrar('saeb')">📈 SAEB</button>
<button onclick="mostrar('projetos')">🧩 Projetos</button>
<button onclick="mostrar('eventos')">🎉 Eventos</button>
<button onclick="mostrar('resultados')">🏆 Resultados</button>
</nav>

<div class="admin-btn" onclick="login()">⚙️</div>

<section id="inicio" class="active"><h2>Bem-vindo ao PAULA EDUCA</h2></section>

<section id="conteudos">
<h2>Conteúdos</h2>
<div id="listaConteudos"></div>
</section>

<section id="atividades">
<h2>Atividades</h2>
<div id="listaAtividades"></div>
</section>

<section id="simulados">
<h2>Simulados</h2>
<div id="listaSimulados"></div>
</section>

<section id="ade">
<h2>Avaliações ADE</h2>
<div id="listaAde"></div>
</section>

<section id="saeb">
<h2>Avaliações SAEB</h2>
<div id="listaSaeb"></div>
</section>

<section id="projetos"><h2>Projetos</h2></section>
<section id="eventos"><h2>Eventos</h2></section>
<section id="resultados"><h2>Resultados</h2></section>

<section id="admin">

<h2>Painel do Professor</h2>

<h3>Cadastrar Conteúdo</h3>

<input id="tituloConteudo" placeholder="Título">
<input id="serieConteudo" placeholder="Série">
<input id="disciplinaConteudo" placeholder="Disciplina">
<input type="file" id="pdfConteudo">

<button class="salvar" onclick="salvarConteudo()">Salvar Conteúdo</button>

<div id="adminConteudos"></div>

<hr>

<h3>Cadastrar Questão</h3>

<select id="tipoQuestao">
<option>Atividade</option>
<option>Simulado</option>
<option>ADE</option>
<option>SAEB</option>
</select>

<input id="serieQuestao" placeholder="Série">
<input id="disciplinaQuestao" placeholder="Disciplina">

<textarea id="pergunta" placeholder="Pergunta"></textarea>

<input type="file" id="imagemPergunta">

<input id="a" placeholder="Alternativa A">
<input id="b" placeholder="Alternativa B">
<input id="c" placeholder="Alternativa C">
<input id="d" placeholder="Alternativa D">

<select id="correta">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<button class="salvar" onclick="salvarQuestao()">Salvar Questão</button>

<div id="adminQuestoes"></div>

</section>

<script>

function mostrar(id){

document.querySelectorAll("section").forEach(sec=>sec.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

function login(){

if(prompt("Senha do professor:")=="1234"){

mostrar("admin");
carregarTudo();

}else{

alert("Senha incorreta");

}

}

let conteudos=JSON.parse(localStorage.getItem("conteudos"))||[];

let questoes=JSON.parse(localStorage.getItem("questoes"))||[];

function salvarConteudo(){

let titulo=document.getElementById("tituloConteudo").value;
let serie=document.getElementById("serieConteudo").value;
let disciplina=document.getElementById("disciplinaConteudo").value;
let file=document.getElementById("pdfConteudo").files[0];

if(!file){alert("Selecione um PDF");return;}

let reader=new FileReader();

reader.onload=function(){

conteudos.push({titulo,serie,disciplina,pdf:reader.result});

localStorage.setItem("conteudos",JSON.stringify(conteudos));

carregarTudo();

};

reader.readAsDataURL(file);

}

function removerConteudo(i){

conteudos.splice(i,1);

localStorage.setItem("conteudos",JSON.stringify(conteudos));

carregarTudo();

}

function salvarQuestao(){

questoes.push({

tipo:document.getElementById("tipoQuestao").value,
serie:document.getElementById("serieQuestao").value,
disciplina:document.getElementById("disciplinaQuestao").value,
pergunta:document.getElementById("pergunta").value,
a:document.getElementById("a").value,
b:document.getElementById("b").value,
c:document.getElementById("c").value,
d:document.getElementById("d").value,
correta:document.getElementById("correta").value

});

localStorage.setItem("questoes",JSON.stringify(questoes));

carregarTudo();

}

function removerQuestao(i){

questoes.splice(i,1);

localStorage.setItem("questoes",JSON.stringify(questoes));

carregarTudo();

}

function carregarTudo(){

let lc=document.getElementById("listaConteudos");
let la=document.getElementById("listaAtividades");
let ls=document.getElementById("listaSimulados");
let lade=document.getElementById("listaAde");
let lsaeb=document.getElementById("listaSaeb");

let ac=document.getElementById("adminConteudos");
let aq=document.getElementById("adminQuestoes");

if(lc) lc.innerHTML="";
if(la) la.innerHTML="";
if(ls) ls.innerHTML="";
if(lade) lade.innerHTML="";
if(lsaeb) lsaeb.innerHTML="";
if(ac) ac.innerHTML="";
if(aq) aq.innerHTML="";

conteudos.forEach((c,i)=>{

if(lc){

lc.innerHTML+=`<div class="card">
<b>${c.titulo}</b><br>
${c.serie} - ${c.disciplina}<br>
<a href="${c.pdf}" download>Baixar PDF</a>
</div>`;

}

if(ac){

ac.innerHTML+=`<div class="card">
${c.titulo}
<button class="small-btn" onclick="removerConteudo(${i})">Excluir</button>
</div>`;

}

});

questoes.forEach((q,i)=>{

let bloco=`<div class="card">
<b>${q.pergunta}</b><br>
A) ${q.a}<br>
B) ${q.b}<br>
C) ${q.c}<br>
D) ${q.d}
</div>`;

if(q.tipo=="Atividade" && la) la.innerHTML+=bloco;
if(q.tipo=="Simulado" && ls) ls.innerHTML+=bloco;
if(q.tipo=="ADE" && lade) lade.innerHTML+=bloco;
if(q.tipo=="SAEB" && lsaeb) lsaeb.innerHTML+=bloco;

if(aq){

aq.innerHTML+=`<div class="card">
${q.pergunta}
<button class="small-btn" onclick="removerQuestao(${i})">Excluir</button>
</div>`;

}

});

}

carregarTudo();

</script>

</body>
</html>
